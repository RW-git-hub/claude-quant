name: tests

# Enforces the "execution-verified" promise: every template's self-tests and the
# end-to-end example must run green. Runs on push and PR, across supported Python
# versions, so numpy/pandas version drift is caught early.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  self-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skills/claude-quant/requirements.txt

      - name: Show versions
        run: python -c "import numpy, pandas; print('numpy', numpy.__version__, '| pandas', pandas.__version__)"

      - name: Run every template's self-tests
        run: python skills/claude-quant/templates/run_all_tests.py

      - name: Run the end-to-end example
        run: python skills/claude-quant/examples/end_to_end.py
